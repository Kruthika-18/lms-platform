groups:
  - name: lms-alerts
    rules:
      # API latency
      - alert: HighApiLatency
        expr: http_request_duration_seconds{quantile="0.99"} > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency > 2s"
          description: "{{ $labels.job }} p99 latency is {{ $value }}s"

      # Error rate
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1%"

      # DB connections
      - alert: HighDbConnections
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connections > 80"

      # Redis memory
      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory > 80%"

      # Queue depth
      - alert: BullQueueBacklog
        expr: bullmq_queue_waiting > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BullMQ queue has > 500 waiting jobs"

      # Certificate worker failures
      - alert: CertificateWorkerFailing
        expr: increase(bullmq_job_failed_total{queue="certificates"}[15m]) > 5
        labels:
          severity: critical
        annotations:
          summary: "Certificate generation failing"
