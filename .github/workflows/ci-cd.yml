name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint & Type check ────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: cd apps/api && npx tsc --noEmit
      - run: cd apps/web && npx tsc --noEmit

  # ─── Unit & Integration tests ─────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run DB migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/lms_test
        run: cd apps/api && npm run db:migrate
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/lms_test
          REDIS_URL:    redis://localhost:6379
          JWT_SECRET:   test-secret-min-64-chars-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
          NODE_ENV:     test
        run: npm run test

  # ─── Security audit ───────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'

  # ─── Build & Push Docker images ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file:    ./infra/docker/api.Dockerfile
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest

      - uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          file:    ./infra/docker/web.Dockerfile
          push:    true
          tags:    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest

  # ─── Deploy to production ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
      - name: Run DB migrations (zero-downtime)
        run: |
          echo "Run: kubectl exec <api-pod> -- npm run db:migrate"
      - name: Rolling deploy API
        run: |
          echo "kubectl set image deployment/lms-api api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}"
      - name: Rolling deploy Web
        run: |
          echo "kubectl set image deployment/lms-web web=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:${{ github.sha }}"
